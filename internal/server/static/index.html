<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super-Agent — Command Center</title>
    <meta name="description" content="AI-powered real estate listing-to-social pipeline">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.07);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(99, 102, 241, 0.3);
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --accent-indigo: #818cf8;
            --accent-violet: #a78bfa;
            --accent-emerald: #34d399;
            --accent-amber: #fbbf24;
            --accent-rose: #fb7185;
            --accent-cyan: #22d3ee;
            --gradient-hero: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-card: linear-gradient(135deg, rgba(99,102,241,0.1) 0%, rgba(168,85,247,0.05) 100%);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(168,85,247,0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(34,211,153,0.04) 0%, transparent 50%);
        }

        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

        /* ─── Header ─── */
        header {
            padding: 24px 0 16px;
            border-bottom: 1px solid var(--border-subtle);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,15,0.8);
        }
        .header-inner {
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo {
            display: flex; align-items: center; gap: 12px;
            font-size: 20px; font-weight: 700;
        }
        .logo-icon {
            width: 36px; height: 36px; border-radius: 10px;
            background: var(--gradient-hero);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .logo span { background: var(--gradient-hero); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .version {
            font-size: 11px; color: var(--text-muted); font-weight: 500;
            padding: 2px 8px; border: 1px solid var(--border-subtle);
            border-radius: 20px; margin-left: 8px;
        }
        .header-status {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--text-secondary);
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent-emerald);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52,211,153,0.4); }
            50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(52,211,153,0); }
        }

        /* ─── Spotlight Search ─── */
        .search-section { padding: 40px 0 32px; }
        .search-bar {
            position: relative; max-width: 640px; margin: 0 auto;
        }
        .search-bar input {
            width: 100%; padding: 16px 20px 16px 52px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-size: 15px; font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }
        .search-bar input:focus {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glow);
            background: rgba(255,255,255,0.06);
        }
        .search-bar input::placeholder { color: var(--text-muted); }
        .search-icon {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 18px;
        }
        .search-shortcut {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            display: flex; gap: 4px;
        }
        .kbd {
            padding: 2px 6px; border-radius: 4px; font-size: 11px;
            background: rgba(255,255,255,0.06); border: 1px solid var(--border-subtle);
            color: var(--text-muted); font-family: inherit;
        }
        .search-results {
            position: absolute; top: calc(100% + 8px); left: 0; right: 0;
            background: var(--bg-secondary); border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md); overflow: hidden;
            display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .search-results.active { display: block; }
        .search-result-item {
            padding: 12px 16px; cursor: pointer;
            border-bottom: 1px solid var(--border-subtle);
            transition: background 0.15s;
        }
        .search-result-item:hover { background: var(--bg-card-hover); }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-title { font-size: 14px; font-weight: 500; }
        .search-result-meta {
            font-size: 12px; color: var(--text-secondary); margin-top: 2px;
            display: flex; gap: 12px;
        }

        /* ─── Stats Grid ─── */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px; margin-bottom: 32px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 20px;
            transition: all 0.3s ease;
            cursor: default;
        }
        .stat-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-glow);
            transform: translateY(-2px);
        }
        .stat-label {
            font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-muted); font-weight: 600; margin-bottom: 8px;
        }
        .stat-value {
            font-size: 32px; font-weight: 800; line-height: 1;
        }
        .stat-total .stat-value { background: var(--gradient-hero); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-draft .stat-value { color: var(--text-secondary); }
        .stat-prepped .stat-value { color: var(--accent-amber); }
        .stat-approved .stat-value { color: var(--accent-cyan); }
        .stat-posted .stat-value { color: var(--accent-emerald); }
        .stat-failed .stat-value { color: var(--accent-rose); }

        /* ─── Section Headers ─── */
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 18px; font-weight: 700;
            display: flex; align-items: center; gap: 8px;
        }
        .section-badge {
            font-size: 12px; font-weight: 600;
            padding: 2px 10px; border-radius: 20px;
            background: rgba(99,102,241,0.15); color: var(--accent-indigo);
        }

        /* ─── Listing Cards ─── */
        .listings-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px; margin-bottom: 40px;
        }
        .listing-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .listing-card:hover {
            border-color: var(--border-glow);
            transform: translateY(-3px);
            box-shadow: var(--shadow-glow);
        }
        .listing-card-body { padding: 20px; }
        .listing-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 12px;
        }
        .listing-title {
            font-size: 15px; font-weight: 600; line-height: 1.4;
            flex: 1; margin-right: 12px;
        }
        .listing-status {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            padding: 3px 10px; border-radius: 20px; white-space: nowrap;
            letter-spacing: 0.3px;
        }
        .status-draft { background: rgba(136,136,160,0.15); color: var(--text-secondary); }
        .status-prepped { background: rgba(251,191,36,0.15); color: var(--accent-amber); }
        .status-approved { background: rgba(34,211,238,0.15); color: var(--accent-cyan); }
        .status-posted { background: rgba(52,211,153,0.15); color: var(--accent-emerald); }
        .status-failed { background: rgba(251,113,133,0.15); color: var(--accent-rose); }

        .listing-desc {
            font-size: 13px; color: var(--text-secondary); line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .listing-specs {
            display: flex; gap: 16px; margin-bottom: 16px;
            font-size: 13px; color: var(--text-secondary);
        }
        .listing-spec { display: flex; align-items: center; gap: 4px; }
        .listing-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 16px; border-top: 1px solid var(--border-subtle);
        }
        .listing-price {
            font-size: 18px; font-weight: 700;
            background: var(--gradient-hero); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .listing-price-unit {
            font-size: 12px; color: var(--text-muted); font-weight: 400;
            -webkit-text-fill-color: var(--text-muted);
        }
        .listing-location {
            font-size: 12px; color: var(--text-muted);
            display: flex; align-items: center; gap: 4px;
        }
        .listing-tags {
            display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;
        }
        .listing-tag {
            font-size: 11px; padding: 2px 8px; border-radius: 4px;
            background: rgba(129,140,248,0.1); color: var(--accent-indigo);
            font-weight: 500;
        }
        .listing-langs {
            display: flex; gap: 4px;
        }
        .lang-badge {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            padding: 2px 6px; border-radius: 4px;
            background: rgba(255,255,255,0.06); color: var(--text-muted);
        }
        .lang-badge.active { background: rgba(52,211,153,0.15); color: var(--accent-emerald); }

        /* ─── Quick Actions ─── */
        .quick-actions {
            display: flex; gap: 8px; margin-top: 12px;
        }
        .btn {
            padding: 8px 14px; border-radius: var(--radius-sm);
            font-size: 12px; font-weight: 600; font-family: inherit;
            cursor: pointer; border: none; transition: all 0.2s;
        }
        .btn-prep {
            background: rgba(251,191,36,0.15); color: var(--accent-amber);
        }
        .btn-prep:hover { background: rgba(251,191,36,0.25); }
        .btn-post {
            background: rgba(52,211,153,0.15); color: var(--accent-emerald);
        }
        .btn-post:hover { background: rgba(52,211,153,0.25); }

        /* ─── Empty State ─── */
        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state-title { font-size: 18px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
        .empty-state-desc { font-size: 14px; max-width: 400px; margin: 0 auto; line-height: 1.6; }
        .empty-state code {
            background: rgba(255,255,255,0.06); padding: 2px 8px;
            border-radius: 4px; font-size: 13px; color: var(--accent-indigo);
        }

        /* ─── Footer ─── */
        footer {
            padding: 24px 0; text-align: center;
            border-top: 1px solid var(--border-subtle);
            color: var(--text-muted); font-size: 13px;
            margin-top: 40px;
        }

        /* ─── Loading ─── */
        .loading { display: flex; justify-content: center; padding: 40px; }
        .spinner {
            width: 32px; height: 32px; border-radius: 50%;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--accent-indigo);
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Responsive ─── */
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .listings-grid { grid-template-columns: 1fr; }
            .search-shortcut { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <header>
        <div class="container">
            <div class="header-inner">
                <div class="logo">
                    <div class="logo-icon">🏠</div>
                    <span>Super-Agent</span>
                    <span class="version">v0.1.0</span>
                </div>
                <div class="header-status">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Connecting...</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Spotlight Search -->
        <section class="search-section">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput"
                    placeholder="Search listings... (e.g., 'condo near BTS Ari under 20k')"
                    autocomplete="off">
                <div class="search-shortcut">
                    <span class="kbd">⌘</span><span class="kbd">K</span>
                </div>
                <div class="search-results" id="searchResults"></div>
            </div>
        </section>

        <!-- Pipeline Stats -->
        <section id="statsSection">
            <div class="section-header">
                <h2 class="section-title">📊 Pipeline Overview</h2>
            </div>
            <div class="stats-grid" id="statsGrid">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </section>

        <!-- Listings -->
        <section id="listingsSection">
            <div class="section-header">
                <h2 class="section-title">
                    🏠 Listings
                    <span class="section-badge" id="listingsCount">0</span>
                </h2>
            </div>
            <div class="listings-grid" id="listingsGrid">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            Super-Agent CLI v0.1.0 — Open Source Real Estate Pipeline
        </div>
    </footer>

    <script>
        const API = '';

        // ─── Fetch & Render ───
        async function fetchHealth() {
            try {
                const r = await fetch(`${API}/api/health`);
                const data = await r.json();
                document.getElementById('statusDot').style.background =
                    data.status === 'healthy' ? '#34d399' : '#fb7185';
                document.getElementById('statusText').textContent =
                    data.status === 'healthy'
                        ? `DB Connected · ${data.listings} listings`
                        : 'Disconnected';
            } catch {
                document.getElementById('statusDot').style.background = '#fb7185';
                document.getElementById('statusText').textContent = 'Offline';
            }
        }

        async function fetchPipeline() {
            try {
                const r = await fetch(`${API}/api/pipeline`);
                const stats = await r.json();
                renderStats(stats);
            } catch {
                document.getElementById('statsGrid').innerHTML =
                    '<p style="color:var(--text-muted)">Failed to load pipeline stats</p>';
            }
        }

        function renderStats(stats) {
            const items = [
                { key: 'total', label: 'Total', cls: 'stat-total', icon: '📋' },
                { key: 'draft', label: 'Draft', cls: 'stat-draft', icon: '📝' },
                { key: 'prepped', label: 'Prepped', cls: 'stat-prepped', icon: '🎨' },
                { key: 'approved', label: 'Approved', cls: 'stat-approved', icon: '✅' },
                { key: 'posted', label: 'Posted', cls: 'stat-posted', icon: '📤' },
                { key: 'failed', label: 'Failed', cls: 'stat-failed', icon: '❌' },
            ];
            document.getElementById('statsGrid').innerHTML = items.map(s => `
                <div class="stat-card ${s.cls}">
                    <div class="stat-label">${s.icon} ${s.label}</div>
                    <div class="stat-value">${stats[s.key] || 0}</div>
                </div>
            `).join('');
        }

        async function fetchListings() {
            try {
                const r = await fetch(`${API}/api/listings`);
                const data = await r.json();
                document.getElementById('listingsCount').textContent = data.total;
                renderListings(data.listings);
            } catch {
                document.getElementById('listingsGrid').innerHTML =
                    '<p style="color:var(--text-muted)">Failed to load listings</p>';
            }
        }

        function renderListings(listings) {
            if (!listings || listings.length === 0) {
                document.getElementById('listingsGrid').innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">🏗️</div>
                        <div class="empty-state-title">No listings yet</div>
                        <div class="empty-state-desc">
                            Sync your first listings using the CLI:<br><br>
                            <code>super-agent sync --source your-db-url</code>
                        </div>
                    </div>`;
                return;
            }

            document.getElementById('listingsGrid').innerHTML = listings.map(l => {
                const price = l.price
                    ? `฿${Number(l.price).toLocaleString()}`
                    : 'Price TBD';
                const unit = l.listing_type === 'rent' ? '/mo' : '';
                const specs = [];
                if (l.bedrooms) specs.push(`🛏 ${l.bedrooms}`);
                if (l.bathrooms) specs.push(`🚿 ${l.bathrooms}`);
                if (l.area_sqm) specs.push(`📐 ${l.area_sqm} sqm`);

                const tags = (l.tags || []).map(t =>
                    `<span class="listing-tag">${t}</span>`
                ).join('');

                const langs = ['th','en','my'].map(lang => {
                    const active = (l.content_languages || []).includes(lang);
                    return `<span class="lang-badge ${active ? 'active' : ''}">${lang}</span>`;
                }).join('');

                const location = [l.district, l.province].filter(Boolean).join(', ');

                return `
                <div class="listing-card">
                    <div class="listing-card-body">
                        <div class="listing-header">
                            <div class="listing-title">${l.title}</div>
                            <span class="listing-status status-${l.status}">${l.status}</span>
                        </div>
                        ${l.description ? `<div class="listing-desc">${l.description}</div>` : ''}
                        ${tags ? `<div class="listing-tags">${tags}</div>` : ''}
                        ${specs.length ? `<div class="listing-specs">${specs.map(s => `<span class="listing-spec">${s}</span>`).join('')}</div>` : ''}
                        <div class="listing-footer">
                            <div>
                                <span class="listing-price">${price}</span>
                                <span class="listing-price-unit">${unit}</span>
                            </div>
                            <div style="display:flex;align-items:center;gap:8px;">
                                ${langs}
                                ${location ? `<span class="listing-location">📍 ${location}</span>` : ''}
                            </div>
                        </div>
                        <div class="quick-actions">
                            <button class="btn btn-prep" onclick="alert('Run: super-agent prep --id ${l.id}')">🎨 Prep</button>
                            <button class="btn btn-post" onclick="alert('Run: super-agent post --id ${l.id}')">📤 Post</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // ─── Search ───
        let searchTimeout;
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');

        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const q = e.target.value.trim();
            if (q.length < 2) {
                searchResults.classList.remove('active');
                return;
            }
            searchTimeout = setTimeout(() => doSearch(q), 300);
        });

        searchInput.addEventListener('blur', () => {
            setTimeout(() => searchResults.classList.remove('active'), 200);
        });

        async function doSearch(query) {
            try {
                const r = await fetch(`${API}/api/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, limit: 5 }),
                });
                const data = await r.json();
                if (data.results && data.results.length > 0) {
                    searchResults.innerHTML = data.results.map(r => `
                        <div class="search-result-item">
                            <div class="search-result-title">${r.title}</div>
                            <div class="search-result-meta">
                                <span>${r.property_type}</span>
                                ${r.price ? `<span>฿${Number(r.price).toLocaleString()}</span>` : ''}
                                ${r.district ? `<span>📍 ${r.district}</span>` : ''}
                                <span class="listing-status status-${r.status}" style="font-size:10px;padding:1px 6px;">${r.status}</span>
                            </div>
                        </div>
                    `).join('');
                    searchResults.classList.add('active');
                } else {
                    searchResults.innerHTML = `
                        <div class="search-result-item">
                            <div class="search-result-title" style="color:var(--text-muted)">No results for "${query}"</div>
                        </div>`;
                    searchResults.classList.add('active');
                }
            } catch {
                searchResults.classList.remove('active');
            }
        }

        // CMD+K shortcut
        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
            }
            if (e.key === 'Escape') {
                searchResults.classList.remove('active');
                searchInput.blur();
            }
        });

        // ─── Init ───
        fetchHealth();
        fetchPipeline();
        fetchListings();
        setInterval(fetchHealth, 10000);
    </script>
</body>
</html>
